    /* Mobile-web-specific shell */
    body.device-mobile-web .app-frame { display: flex; flex-direction: column; }
    body.device-mobile-web .app-content { padding-bottom: 76px; }

    .bc-mob-topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: var(--space-2);
      padding: 10px 12px;
      background: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border);
      min-height: 52px;
    }
    .bc-mob-topbar__title { flex: 1; font-weight: 600; font-size: 15px; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bc-mob-topbar__btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: transparent; border: 1px solid transparent;
      color: var(--color-text-primary); font-size: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .bc-mob-topbar__btn:hover { background: var(--color-bg-tertiary); }

    .bc-bottom-nav {
      position: absolute !important;
      bottom: 0; left: 0; right: 0;
      background: var(--color-bg-elevated);
      border-top: 1px solid var(--color-border);
      display: flex;
      padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
      z-index: 30;
    }
    .bc-bottom-nav__item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: transparent; border: 0;
      padding: 6px 4px;
      font-size: 11px; color: var(--color-text-secondary); cursor: pointer;
      min-height: 48px;
    }
    .bc-bottom-nav__item .ico { font-size: 18px; line-height: 1; }
    .bc-bottom-nav__item.active { color: var(--color-accent); }

    .device-mobile-web .bc-playbar {
      position: sticky; bottom: 0;
      margin: 0; border-radius: 14px 14px 0 0;
      flex-wrap: wrap;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      gap: 8px;
    }
    .device-mobile-web .bc-playbar__time { font-size: 12px; }
    .device-mobile-web .bc-playbar .bc-playbar__play { width: 44px; height: 44px; font-size: 16px; }
    .device-mobile-web .bc-playbar .bc-playbar__control { min-width: 44px; min-height: 44px; }

    .screen { padding: 14px 14px 12px; }
    .screen h1 { font-size: 20px; }
    .screen h2 { font-size: 16px; }

    .state-switcher {
      display: flex; gap: 4px;
      overflow-x: auto;
      padding: 8px 12px;
      background: var(--color-bg-tertiary);
      border-bottom: 1px solid var(--color-border);
      scrollbar-width: none;
    }
    .state-switcher::-webkit-scrollbar { display: none; }
    .state-switcher__btn {
      padding: 5px 10px; border-radius: 999px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-strong);
      color: var(--color-text-secondary);
      font-size: 11px; white-space: nowrap; cursor: pointer;
    }
    .state-switcher__btn.active {
      background: var(--color-accent); color: #fff; border-color: var(--color-accent);
    }

    .reader-header {
      display: flex; flex-direction: column; gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-elevated);
      position: sticky; top: 0; z-index: 15;
    }
    .reader-header__row { display: flex; align-items: center; gap: 8px; }
    .reader-header .toc-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--color-border);
      padding: 6px 10px; border-radius: 6px;
      font-size: 12px; color: var(--color-text-primary);
      text-align: left;
      min-height: 36px;
    }
    .reader-header .nav-btn {
      width: 44px; height: 44px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-elevated);
      color: var(--color-text-primary);
      font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .reader-header .nav-btn[disabled] { opacity: 0.4; }
    .reader-header .nav-btn--play {
      background: var(--color-accent); color: #fff; border-color: var(--color-accent);
      width: auto; padding: 0 14px; gap: 6px;
    }
    .reader-header .nav-btn--play[disabled] { background: var(--color-border-strong); border-color: var(--color-border-strong); color: var(--color-text-secondary); }
    .reader-header .toggle-group {
      flex: 1;
      display: inline-flex; border: 1px solid var(--color-border); border-radius: 8px; overflow: hidden;
    }
    .reader-header .toggle-group button {
      flex: 1; min-height: 44px; background: var(--color-bg-elevated);

    .reader-header .toggle-group button.active { background: var(--color-accent); color: #fff; }
    .breadcrumb { color: var(--color-text-secondary); font-size: 12px; }

    .summary-prose p { line-height: 1.65; color: var(--color-text-primary); margin-bottom: 12px; font-size: 15px; }

    .resume-card {
      padding: 12px; border: 1px solid var(--color-border);

    .book-card {
      display: flex; gap: 12px; padding: 12px;

      border: 1px solid var(--color-border);

    .section-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: 10px;

    .section-row__title { flex: 1; min-width: 0; }

      border: 1px solid var(--color-border); background: var(--color-bg-elevated);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-primary);

    .icon44--accent { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
    .icon44[disabled] { opacity: 0.4; cursor: not-allowed; }

    .book-tabstrip {
      display: flex; gap: 0;
      overflow-x: auto;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-bg-elevated);
      padding: 0 8px;
      scrollbar-width: none;
    }
    .book-tabstrip::-webkit-scrollbar { display: none; }
    .book-tabstrip button {
      padding: 12px 12px;
      background: transparent; border: 0;
      font-size: 13px; font-weight: 500;
      color: var(--color-text-secondary);
      border-bottom: 2px solid transparent;
      white-space: nowrap; cursor: pointer;

    .book-tabstrip button.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }

    .voice-row__name span { font-size: 11px; color: var(--color-text-secondary); }

      padding: 12px; border: 1px solid var(--color-border);
      border-radius: 10px; margin-bottom: 8px;
      background: var(--color-bg-elevated);
    }

    .ann-card .note { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; line-height: 1.5; }
    .ann-card .meta { font-size: 11px; color: var(--color-text-muted); margin-top: 6px; }

    .row-tight { display: flex; align-items: center; gap: 8px; }
    .muted { color: var(--color-text-secondary); }

    .check-row input[type=checkbox] { width: 18px; height: 18px; }

  <script type="text/babel" data-presets="react">
(() => {
/* Book Companion audiobook prototype — shared atoms.
 * JSX compiled at runtime by Babel-standalone. Token values come from
 * window.__designTokens; structural styles come from prototype.css +
 * design-overlay.css.
 */

const Button = ({ variant = "primary", onClick, children, disabled, loading, type = "button", ariaLabel, size = "md", className = "" }) => (
  <button
    type={type}
    className={`btn btn--${variant} btn--${size} ${loading ? "btn--loading" : ""} ${className}`}
    onClick={onClick}
    disabled={disabled || loading}
    aria-label={ariaLabel}
  >
    {loading ? <Spinner size="sm" /> : children}
  </button>
);

const IconButton = ({ icon, onClick, ariaLabel, variant = "ghost", disabled, className = "" }) => (
  <button
    type="button"
    className={`btn btn--${variant} btn--icon ${className}`}
    onClick={onClick}
    aria-label={ariaLabel}
    disabled={disabled}
  >
    <span aria-hidden="true">{icon}</span>
  </button>
);

const Input = ({ label, value, onChange, error, type = "text", placeholder, required, name, autoComplete, hint }) => (
  <label className={`field ${error ? "field--error" : ""}`}>
    {label && <span className="field__label">{label}{required && <span className="field__required" aria-label="required"> *</span>}</span>}
    <input
      className="field__input"
      type={type}
      name={name}
      value={value}
      onChange={(e) => onChange(e.target.value)}
      placeholder={placeholder}
      autoComplete={autoComplete}
      aria-invalid={!!error}
      aria-describedby={error ? `${name}-error` : hint ? `${name}-hint` : undefined}
    />
    {hint && !error && <span id={`${name}-hint`} className="field__hint">{hint}</span>}
    {error && <span id={`${name}-error`} className="field__error" role="alert">{error}</span>}
  </label>
);

const Modal = ({ open, onClose, title, children, footer, size = "md" }) => {
  const dialogRef = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    // Focus trap (simple): focus first focusable inside dialog
    setTimeout(() => {
      const f = dialogRef.current?.querySelector("button, input, select, textarea, [tabindex]:not([tabindex='-1'])");
      f?.focus();
    }, 0);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose} role="presentation">
      <div
        className={`modal modal--${size}`}
        ref={dialogRef}
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <header className="modal__header">
          <h2 id="modal-title" className="modal__title">{title}</h2>
          <button className="modal__close" onClick={onClose} aria-label="Close">×</button>
        </header>
        <div className="modal__body">{children}</div>
        {footer && <footer className="modal__footer">{footer}</footer>}
      </div>
    </div>
  );
};

const Toast = ({ type = "info", message, onDismiss }) => (
  <div className={`toast toast--${type}`} role="status">
    <span className="toast__message">{message}</span>
    <button className="toast__dismiss" onClick={onDismiss} aria-label="Dismiss">×</button>
  </div>
);

const Card = ({ header, footer, children, onClick, className = "", ariaLabel }) => (
  <div
    className={`card ${onClick ? "card--clickable" : ""} ${className}`}
    onClick={onClick}
    onKeyDown={onClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick(); } } : undefined}
    role={onClick ? "button" : undefined}
    tabIndex={onClick ? 0 : undefined}
    aria-label={ariaLabel}
  >
    {header && <header className="card__header">{header}</header>}
    <div className="card__body">{children}</div>
    {footer && <footer className="card__footer">{footer}</footer>}
  </div>
);

const Table = ({ columns, rows, onRowClick, loading, emptyState, ariaLabel }) => {
  if (loading) return <TableSkeleton rows={5} columns={columns.length} />;
  if (!rows?.length) return emptyState || <EmptyState title="No records" />;
  return (
    <table className="table" aria-label={ariaLabel}>
      <thead>
        <tr>{columns.map((c) => <th key={c.key} scope="col" style={c.width ? { width: c.width } : undefined}>{c.label}</th>)}</tr>
      </thead>
      <tbody>
        {rows.map((row) => (
          <tr
            key={row.id}
            onClick={onRowClick ? () => onRowClick(row) : undefined}
            tabIndex={onRowClick ? 0 : -1}
          >
            {columns.map((c) => <td key={c.key}>{c.render ? c.render(row) : row[c.key]}</td>)}
          </tr>
        ))}
      </tbody>
    </table>
  );
};

const TableSkeleton = ({ rows, columns }) => (
  <table className="table table--loading">
    <tbody>
      {Array.from({ length: rows }).map((_, i) => (
        <tr key={i}>{Array.from({ length: columns }).map((_, j) => (
          <td key={j}><span className="skeleton skeleton--text" /></td>
        ))}</tr>
      ))}
    </tbody>
  </table>
);

const EmptyState = ({ icon = "📭", title, description, cta }) => (
  <div className="empty-state">
    <div className="empty-state__icon" aria-hidden="true" style={{ fontSize: 32 }}>{icon}</div>
    <h3 className="empty-state__title">{title}</h3>

const Spinner = ({ size = "md", label = "Loading" }) => (

);

const Badge = ({ tone = "neutral", children }) => (
  <span className={`badge badge--${tone}`}>{children}</span>
);

const Avatar = ({ name, src, size = "md" }) => {
  const initials = (name || "?").split(" ").map((n) => n[0]).slice(0, 2).join("").toUpperCase();
  return src
    ? <img className={`avatar avatar--${size}`} src={src} alt={name} />
    : <span className={`avatar avatar--${size} avatar--initials`} aria-label={name}>{initials}</span>;
};

const BookCover = ({ initials, size = "md" }) => (

);

const EngineChip = ({ engine, voice }) => {
  const isKokoro = engine === "kokoro";
  return (
    <span className={`bc-engine-chip ${isKokoro ? "" : "bc-engine-chip--web"}`} title={`Engine: ${engine}, voice: ${voice || ""}`}>
      <span aria-hidden="true">{isKokoro ? "◆" : "◇"}</span>

    </span>

const CoverageBar = ({ done, total, ariaLabel }) => {
  const pct = total ? Math.round((done / total) * 100) : 0;
  return (
    <div className="bc-coverage-bar" role="progressbar" aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100" aria-label={ariaLabel}>
      <span className="bc-coverage-bar__fill" style={{ width: `${pct}%` }} />

  );

const Banner = ({ tone = "warning", icon, title, body, action, onDismiss }) => (
  <div className={`bc-banner ${tone === "info" ? "bc-banner--info" : ""}`} role={tone === "info" ? "status" : "alert"}>

const SpeedSelect = ({ value, onChange }) => (

        <option key={s} value={s}>{s}×</option>
      ))}
    </select>

);

const Playbar = ({ extraControls, onClose }) => {
  const p = window.__proto.usePlayer();
  const fmt = window.__proto.fmt;
  if (!p.book_id) return null;
  return (
    <div className="bc-playbar" role="region" aria-label="Audio player">
      <button
        className="bc-playbar__play"
        onClick={() => window.__proto.player.toggle()}
        aria-label={p.is_playing ? "Pause" : "Play"}
      >
        <span aria-hidden="true">{p.is_playing ? "❚❚" : "▶"}</span>
      </button>
      <button className="bc-playbar__control" onClick={() => window.__proto.player.skipSentence(-1)} aria-label="Previous sentence">
        <span aria-hidden="true">⏮</span>
      </button>
      <button className="bc-playbar__control" onClick={() => window.__proto.player.skipSentence(1)} aria-label="Next sentence">
        <span aria-hidden="true">⏭</span>
      </button>

        {fmt.duration(p.elapsed_sec)} / {fmt.duration(p.duration_sec)}

          <span style={{ marginLeft: 8, color: "var(--color-text-muted)" }}>· sentence {p.sentence_index + 1} of {p.sentence_count}</span>

const KbdShortcutsModal = () => {

})();
  </script>

  <script type="text/babel" data-presets="react">
(() => {
    /* ────────────────────────────────────────────────────────────────
       Mobile-web prototype screens. Single screens registry per /prototype spec.
       ──────────────────────────────────────────────────────────────── */
    const {

    const useSections = (bookId) => {
      const sections = window.__proto.useStore("sections");
      return sections.filter((s) => s.book_id === bookId).sort((a, b) => a.order_index - b.order_index);

    const useAnnotations = (bookId) => {

      return all.filter((a) => a.book_id === bookId);
    };

    const StateSwitcher = ({ states, value, onChange }) => (
      <div className="state-switcher" role="tablist" aria-label="State switcher">

          <button

            role="tab"
            aria-selected={value === s.key}

          >{s.label}</button>
        ))}
      </div>

    // ─────────────────────────────────────────────────────────────────
    // LIBRARY
    // ─────────────────────────────────────────────────────────────────
    const LibraryScreen = () => {
      const books = window.__proto.useStore("books");
      const [q, setQ] = React.useState("");
      const filtered = books.filter((b) =>
        (b.title + " " + b.author).toLowerCase().includes(q.toLowerCase())
      );
      return (
        <div className="screen">
          <h1 style={{ marginBottom: 8 }}>Library</h1>
          <p className="muted small" style={{ marginBottom: 12 }}>
            Your books with audio progress at a glance.
          </p>
          <input
            type="search"
            placeholder="Search books"
            value={q}
            onChange={(e) => setQ(e.target.value)}
            style={{ width: "100%", marginBottom: 14 }}
            aria-label="Search books"
          />

          {filtered.length === 0 && (
            <EmptyState
              icon="•"
              title="No books match"
              description="Try a different search term."
            />

          {filtered.map((b) => (
            <div
              key={b.id}

              role="button"

              onKeyDown={(e) => { if (e.key === "Enter") navigate(`/books/${b.id}/overview`); }}

              <BookCover initials={b.cover_initials} size="sm" />
              <div className="book-card__body">
                <h3 className="book-card__title">{b.title}</h3>
                <p className="book-card__author">{b.author}</p>
                <div className="book-card__meta">
                  <span className="pill">{b.sections_count} sections</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    };
    window.__screens.library = LibraryScreen;

    // ─────────────────────────────────────────────────────────────────
    // READER SECTION (file 01) — 7 states
    // ─────────────────────────────────────────────────────────────────
    const READER_STATES = [
      { key: "default",     label: "Default" },
      { key: "playing",     label: "Playing" },
      { key: "resume",      label: "Resume" },
      { key: "loading",     label: "Loading voice" },
      { key: "no-summary",  label: "No summary" },
      { key: "stale",       label: "Stale source" },
      { key: "midregen",    label: "Mid-listen regen" },
    ];

    const ReaderSectionScreen = ({ params }) => {
      const bookId = params.id;
      const secId = params.sec;
      const book = useBook(bookId);
      const sections = useSections(bookId);
      const section = sections.find((s) => s.id === secId) || sections[0];
      const [stateKey, setStateKey] = React.useState("default");
      const player = window.__proto.usePlayer();

      // Map state to player config
      React.useEffect(() => {
        if (!section) return;
        if (stateKey === "playing" || stateKey === "midregen") {
          window.__proto.player.load({
            book_id: book.id,
            section_id: section.id,
            sentence_count: section.sentence_count,
            sentence_index: 16,
            duration_sec: section.audio_duration_sec || 368,
            engine: section.engine || "kokoro",
            voice: section.voice || "af_bella",
            speed: 1.25,
          });
          window.__proto.player.play();
        } else if (stateKey === "loading") {
          window.__proto.player.load({
            book_id: book.id,
            section_id: section.id,
            sentence_count: section.sentence_count,
            sentence_index: 0,
            duration_sec: section.audio_duration_sec || 368,
            engine: "kokoro",
            voice: "af_bella",
            speed: 1,
          });
          window.__proto.player.pause();
        } else {
          window.__proto.player.pause();
        }
        return () => window.__proto.player.pause();
      }, [stateKey, section?.id]);

      if (!book || !section) return <NotFoundScreen />;

      const isPlaying = stateKey === "playing" || stateKey === "midregen";
      const isLoading = stateKey === "loading";
      const isResume = stateKey === "resume"
        || (stateKey === "default" && section.audio_status === "complete");
      const isNoSummary = stateKey === "no-summary";
      const isStale = stateKey === "stale";

      const playLabel = isLoading ? "Loading"
        : isPlaying ? "Pause"
        : "Play summary audio";
      const playIcon = isLoading ? "…" : isPlaying ? "❚❚" : "▶";

      return (
        <div>
          <StateSwitcher states={READER_STATES} value={stateKey} onChange={setStateKey} />

          <div className="reader-header">
            <div className="reader-header__row">
              <a className="breadcrumb" href="#/" onClick={(e) => { e.preventDefault(); navigate("/"); }}>Library</a>
              <span className="breadcrumb">/</span>
              <button
                className="toc-btn"
                aria-label="Open section list"
                onClick={() => window.__proto.toast.push({ type: "info", message: "Section list — scroll the sidebar (desktop) or use the back button on mobile (v1 prototype)." })}
              >
                {section.title} ▾
              </button>
            </div>
            <div className="reader-header__row">
              <button
                className="nav-btn"
                aria-label="Previous section"
                disabled={section.order_index <= 1}
                onClick={() => {
                  const prev = sections[sections.findIndex((s) => s.id === section.id) - 1];
                  if (prev) navigate(`/books/${book.id}/section/${prev.id}`);
                }}
              >‹</button>
              <div className="toggle-group" role="tablist">
                <button
                  role="tab"
                  aria-selected={isNoSummary}
                  className={isNoSummary ? "active" : ""}
                  onClick={() => setStateKey("no-summary")}
                >Original</button>
                <button
                  role="tab"
                  aria-selected={!isNoSummary}
                  className={!isNoSummary ? "active" : ""}
                  onClick={() => setStateKey("default")}
                >Summary</button>
              </div>
              <button
                className="nav-btn"
                aria-label="Next section"
                onClick={() => {
                  const next = sections[sections.findIndex((s) => s.id === section.id) + 1];
                  if (next) navigate(`/books/${book.id}/section/${next.id}`);
                }}
              >›</button>
              <button
                className="nav-btn nav-btn--play"
                aria-label={playLabel}
                disabled={isNoSummary || isLoading}
                onClick={() => {
                  if (!isPlaying) setStateKey("playing"); else setStateKey("default");
                }}
              >{playIcon}</button>
            </div>
          </div>

          <div className="screen">
            <div className="breadcrumb small" style={{ marginBottom: 4 }}>
              {book.title} · Section {section.order_index}
            </div>
            <h1 style={{ marginBottom: 6 }}>{section.title}</h1>

            {!isPlaying && !isLoading && !isNoSummary && !isResume && (
              <div className="meta-row">
                <EngineChip engine={section.engine || "web-speech"} voice={section.voice || ""} />
                <span className="pill">~{Math.max(1, Math.round((section.audio_duration_sec || 360) / 60))} min listen</span>
                <span className="pill">chapter</span>
              </div>
            )}

            {isLoading && (
              <div style={{ marginBottom: 12 }}>
                <div className="meta-row" style={{ marginBottom: 10 }}>
                  <EngineChip engine="kokoro" voice="af_bella" />
                  <Spinner size="sm" />
                  <span className="small muted">Warming voice…</span>
                </div>
                <span className="skeleton skeleton--text" style={{ width: '90%', height: 18, marginBottom: 8, display: 'block' }} />
                <span className="skeleton skeleton--text" style={{ width: '90%', height: 18, marginBottom: 8, display: 'block' }} />
                <span className="skeleton skeleton--text" style={{ width: '90%', height: 18, marginBottom: 8, display: 'block' }} />
              </div>
            )}

            {isStale && (
              <Banner
                tone="warning"
                title="Source has been edited"
                body="Audio was generated before recent edits to this summary."
                action={
                  <Button
                    variant="primary"
                    size="md"
                    onClick={async () => {
                      await window.__proto.mockApi.post("/audio/regenerate-stale", { book_id: book.id });
                      setStateKey("default");
                      window.__proto.toast.push({ type: "success", message: "Stale audio regenerated." });
                    }}
                  >Regenerate audio</Button>
                }
              />
            )}

            {isResume && (
              <div className="resume-card">
                <div className="row-tight" style={{ marginBottom: 6 }}>
                  <EngineChip engine={section.engine || "web-speech"} />
                  <span className="pill">paused at sentence 12 of {section.sentence_count}</span>
                </div>
                <div className="small muted">
                  Resume from sentence 12 of {section.sentence_count} · last listened from this browser 2 hours ago.
                </div>
                <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                  <Button variant="primary" size="md" onClick={() => setStateKey("playing")}>Resume</Button>
                  <Button variant="secondary" size="md" onClick={() => setStateKey("default")}>Start over</Button>
                </div>
              </div>
            )}

            {isNoSummary ? (
              <div style={{ marginTop: 12 }}>
                <p className="muted small" style={{ marginBottom: 12 }}>
                  Audio is only generated for summaries. Generate this section's summary first.
                </p>
                <Button variant="primary" size="md">Generate summary</Button>
                <Card className="" header={<span className="small muted">No summary yet for this section.</span>}>
                  <div className="small muted">When you generate a summary, you can listen to it here.</div>
                </Card>
              </div>
            ) : (
              <div className="summary-prose" style={{ marginTop: 14 }}>
                <h2>Summary</h2>
                {section.summary_sentences.map((s, i) => {
                  const activeIdx = section.summary_sentences.length
                    ? (player.sentence_index || 0) % section.summary_sentences.length
                    : 0;
                  const active = isPlaying && i === activeIdx;
                  return (
                    <p key={i}>
                      <span className={active ? "bc-sentence bc-sentence--active bc-sentence--playing" : ""}>{s}</span>
                    </p>
                  );
                })}
              </div>
            )}

            {stateKey === "midregen" && (
              <div style={{ marginTop: 14 }}>
                <Banner
                  tone="info"
                  title="Summary updated"
                  body="A regenerated audio version is available at the next section boundary."
                  action={
                    <Button
                      variant="secondary"
                      size="md"
                      onClick={async () => {
                        await window.__proto.mockApi.post("/audio/regenerate-stale", { book_id: book.id });
                        setStateKey("default");
                        window.__proto.toast.push({ type: "success", message: "Stale audio regenerated." });
                      }}

                  }
                />
              </div>

          </div>

          {(isPlaying || isLoading) && <Playbar onClose={() => setStateKey("default")} />}
        </div>

    };
    window.__screens["reader-section"] = ReaderSectionScreen;

    // ─────────────────────────────────────────────────────────────────
    // BOOK SUMMARY PLAYER (file 02)
    // ─────────────────────────────────────────────────────────────────
    const SUMMARY_STATES = [
      { key: "default", label: "Default" },
      { key: "playing", label: "Playing" },
      { key: "ended",   label: "Ended" },
      { key: "loading", label: "Loading voice" },
    ];

    const BookSummaryPlayerScreen = ({ params }) => {
      const book = useBook(params.id);
      const [stateKey, setStateKey] = React.useState("default");

      React.useEffect(() => {

          window.__proto.player.pause();

        return () => window.__proto.player.pause();
      }, [stateKey, book?.id]);

      if (!book) return <NotFoundScreen />;

      const isPlaying = stateKey === "playing";
      const isLoading = stateKey === "loading";
      const isEnded = stateKey === "ended";

      return (
        <div>
          <StateSwitcher states={SUMMARY_STATES} value={stateKey} onChange={setStateKey} />

          <div className="reader-header">
            <div className="reader-header__row">
              <a className="breadcrumb" href="#/" onClick={(e) => { e.preventDefault(); navigate("/"); }}>Library</a>
              <span className="breadcrumb">/</span>
              <button className="toc-btn">{book.title} ▾</button>
            </div>
            <div className="reader-header__row">
              <div className="toggle-group">
                <button>Original</button>
                <button className="active">Summary</button>
              </div>
              <button
                className="nav-btn nav-btn--play"
                aria-label={isPlaying ? "Pause" : isEnded ? "Replay" : "Listen to book summary"}
                disabled={isLoading}
                onClick={() => {
                  if (isEnded) setStateKey("playing");
                  else if (isPlaying) setStateKey("default");
                  else setStateKey("playing");

                  <div className="voice-row__name">
                    <strong>{v.name}</strong>
                    <span>{v.locale} · {v.gender} · {v.engine === "kokoro" ? "Kokoro" : "Web Speech"}</span>
                  </div>
                  <Button
                    variant="secondary"
                    size="md"
                    onClick={() => playSample(v.id)}
                    disabled={stateKey === "sample" && samplingId === v.id}
                    ariaLabel={`Sample voice ${v.name}`}
                  >
                    {stateKey === "sample" && samplingId === v.id ? <Spinner size="sm" /> : "Sample"}
                  </Button>
                </div>
              ))
            )}

            {engine === "kokoro" && (
              <div style={{ marginTop: 14 }}>
                <h2>Web Speech voices (always available)</h2>
                {webspeechVoices.map((v) => (
                  <div key={v.id} className="voice-row">
                    <div className="voice-row__name">
                      <strong>{v.name}</strong>
                      <span>{v.locale} · {v.gender}</span>
                    </div>
                    <Button variant="secondary" size="md" onClick={() => playSample(v.id)} ariaLabel={`Sample voice ${v.name}`}>
                      {stateKey === "sample" && samplingId === v.id ? <Spinner size="sm" /> : "Sample"}
                    </Button>
                  </div>
                ))}
              </div>
            )}

            <h2 style={{ marginTop: 18 }}>Default speed</h2>
            <SpeedSelect value={speed} onChange={setSpeed} />

            <h2 style={{ marginTop: 18 }}>Auto-advance</h2>
            <label className="check-row">
              <input
                type="checkbox"
                checked={autoAdvance}
                onChange={(e) => setAutoAdvance(e.target.checked)}
              />
              <div style={{ flex: 1 }}>
                <strong>Auto-advance to next section</strong>
                <div className="small muted">When a section finishes, the next one starts automatically.</div>
              </div>
            </label>

            <div style={{ marginTop: 18 }}>
              <Button
                variant="primary"
                size="md"
                onClick={() => window.__proto.toast.push({ type: "success", message: "Settings saved." })}
              >
                Save changes
              </Button>
            </div>
          </div>
        </div>
      );
    };
    window.__screens["settings-tts"] = SettingsTtsScreen;

    // ─────────────────────────────────────────────────────────────────
    // GENERATE AUDIO MODAL (file 04) — centered per DESIGN.md
    // ─────────────────────────────────────────────────────────────────
    const GenerateAudioModal = ({ open, onClose, book, onStarted }) => {
      const voices = window.__proto.useStore("voices");
      const sectionsAll = window.__proto.useStore("sections");
      const sections = sectionsAll.filter((s) => s.book_id === book?.id);
      const [scope, setScope] = React.useState({ sections: true, book_summary: true, annotations: true });
      const [voiceId, setVoiceId] = React.useState("kokoro_af_bella");
      const [speed, setSpeed] = React.useState(1);
      const [submitting, setSubmitting] = React.useState(false);
      const [samplingId, setSamplingId] = React.useState(null);

      if (!book) return null;

      const sectionsCount = sections.length;
      const annotationsCount = window.__proto.store.where("annotations", (a) => a.book_id === book.id).length;
      const minutes = (scope.sections ? sectionsCount * 9 : 0)
        + (scope.book_summary ? 18 : 0)
        + (scope.annotations ? Math.round(annotationsCount * 1.5) : 0);
      const sizeMb = (scope.sections ? sectionsCount * 4.5 : 0)
        + (scope.book_summary ? 9 : 0)
        + (scope.annotations ? annotationsCount * 0.8 : 0);

      const sample = (id) => {
        setSamplingId(id);
        setTimeout(() => setSamplingId(null), 1200);
      };

      const submit = async () => {
        setSubmitting(true);
        await window.__proto.mockApi.post("/audio/generate", {
          book_id: book.id, voice: voiceId, engine: "kokoro",
          sections_total: sectionsCount,
        });
        window.__proto.toast.push({ type: "success", message: `Started audio generation for ${book.title}.` });
        setSubmitting(false);
        onStarted && onStarted();
      };

      return (
        <Modal
          open={open}
          onClose={onClose}
          title={`Generate audio · ${book.title}`}
          footer={
            <>
              <Button variant="secondary" size="md" onClick={onClose}>Cancel</Button>
              <Button
                variant="primary"
                size="md"
                onClick={submit}
                loading={submitting}
                disabled={!Object.values(scope).some(Boolean)}
              >Generate audio</Button>
            </>
          }
        >
          <h3 style={{ marginBottom: 8 }}>What to generate</h3>
          <label className="check-row">
            <input type="checkbox" checked={scope.sections} onChange={(e) => setScope({ ...scope, sections: e.target.checked })} />
            <div style={{ flex: 1 }}>
              <strong>Section summaries</strong>
              <div className="small muted">{sectionsCount} sections</div>
            </div>
          </label>
          <label className="check-row">
            <input type="checkbox" checked={scope.book_summary} onChange={(e) => setScope({ ...scope, book_summary: e.target.checked })} />
            <div style={{ flex: 1 }}>
              <strong>Book summary</strong>
              <div className="small muted">~18 min</div>
            </div>
          </label>
          <label className="check-row">
            <input type="checkbox" checked={scope.annotations} onChange={(e) => setScope({ ...scope, annotations: e.target.checked })} />
            <div style={{ flex: 1 }}>
              <strong>Annotations playlist</strong>
              <div className="small muted">{annotationsCount} highlights</div>
            </div>
          </label>

          <h3 style={{ marginTop: 14, marginBottom: 8 }}>Voice</h3>
          {voices.filter((v) => v.engine === "kokoro").map((v) => (
            <div key={v.id} className="voice-row">
              <input
                type="radio"
                name="gen-voice"
                checked={voiceId === v.id}
                onChange={() => setVoiceId(v.id)}
                aria-label={v.name}
              />
              <div className="voice-row__name">
                <strong>{v.name}</strong>
                <span>{v.locale} · {v.gender}</span>
              </div>
              <Button
                variant="ghost"
                size="sm"
                onClick={() => sample(v.id)}
                disabled={samplingId === v.id}
                ariaLabel={`Sample ${v.name}`}
              >
                {samplingId === v.id ? <Spinner size="sm" /> : "Sample"}
              </Button>
            </div>
          ))}

          <h3 style={{ marginTop: 14, marginBottom: 8 }}>Default playback speed</h3>
          <SpeedSelect value={speed} onChange={setSpeed} />

          <Card header={<strong>Cost estimate</strong>}>
            <div className="small" style={{ marginBottom: 4 }}>
              About <strong>{minutes} minutes</strong> of audio · ~<strong>{fmt.size(sizeMb)}</strong> on disk.
            </div>
            <div className="small muted">
              Generation runs locally with Kokoro. You can leave this page; it will continue in the background.
            </div>
          </Card>
        </Modal>
      );
    };

    // ─────────────────────────────────────────────────────────────────
    // DELETE AUDIO MODAL — type-to-confirm
    // ─────────────────────────────────────────────────────────────────
    const DeleteAudioModal = ({ open, onClose, book, onConfirmed }) => {
      const [text, setText] = React.useState("");
      React.useEffect(() => { if (open) setText(""); }, [open]);
      if (!book) return null;
      const target = "delete";
      const ok = text.trim().toLowerCase() === target;

      const submit = async () => {
        await window.__proto.mockApi.delete(`/books/${book.id}/audio`);
        window.__proto.toast.push({ type: "success", message: `Audio deleted for ${book.title}.` });
        onConfirmed && onConfirmed();
      };

      return (
        <Modal
          open={open}
          onClose={onClose}
          size="sm"
          title="Delete all audio?"
          footer={
            <>
              <Button variant="secondary" size="md" onClick={onClose}>Cancel</Button>
              <Button variant="destructive" size="md" disabled={!ok} onClick={submit}>Delete</Button>
            </>
          }
        >
          <p className="small">
            This removes <strong>{book.audio_total_min} min</strong> ({fmt.size(book.audio_size_mb)}) of generated audio
            for <strong>{book.title}</strong>. Your summaries and annotations are not affected.
          </p>
          <p className="small muted">Type <strong>{target}</strong> to confirm.</p>
          <Input
            label=""
            name="confirm-delete"
            value={text}
            onChange={setText}
            placeholder={target}
          />
        </Modal>
      );
    };

    // ─────────────────────────────────────────────────────────────────
    // NOT FOUND
    // ─────────────────────────────────────────────────────────────────
    const NotFoundScreen = () => (
      <div className="screen">
        <EmptyState
          icon="•"
          title="Page not found"
          description="The screen you tried to open does not exist in this prototype."
          cta={<Button variant="primary" size="md" onClick={() => navigate("/")}>Back to library</Button>}
        />
      </div>
    );
    window.__screens["not-found"] = NotFoundScreen;

    // ─────────────────────────────────────────────────────────────────
    // ROUTER
    // ─────────────────────────────────────────────────────────────────
    const matchRoute = (path) => {
      if (path === "/" || path === "") return { name: "library", params: {} };
      let m = path.match(/^\/books\/([^\/]+)\/section\/([^\/]+)$/);
      if (m) return { name: "reader-section", params: { id: m[1], sec: m[2] } };
      m = path.match(/^\/books\/([^\/]+)\/overview$/);
      if (m) return { name: "overview", params: { id: m[1] } };
      m = path.match(/^\/books\/([^\/]+)\/summary$/);
      if (m) return { name: "book-summary-player", params: { id: m[1] } };
      m = path.match(/^\/books\/([^\/]+)\/audio$/);
      if (m) return { name: "book-audio-tab", params: { id: m[1] } };
      m = path.match(/^\/books\/([^\/]+)\/sections$/);
      if (m) return { name: "sections-audio-tab", params: { id: m[1] } };
      m = path.match(/^\/books\/([^\/]+)\/annotations$/);
      if (m) return { name: "annotations-player", params: { id: m[1] } };
      if (path === "/settings/tts" || path === "/settings") return { name: "settings-tts", params: {} };
      if (path === "/listening") return { name: "listening", params: {} };
      return { name: "not-found", params: {} };
    };

    // ─────────────────────────────────────────────────────────────────
    // APP SHELL
    // ─────────────────────────────────────────────────────────────────
    const TopBar = ({ route, title, showBack }) => (
      <header className="bc-mob-topbar">
        {showBack ? (
          <button
            className="bc-mob-topbar__btn"
            aria-label="Back"
            onClick={() => {
              if (window.history.length > 1) window.history.back();
              else navigate("/");
            }}
          >‹</button>
        ) : (
          <span style={{ width: 36 }} />
        )}
        <div className="bc-mob-topbar__title">{title}</div>
        {(typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(any-hover: hover)').matches) && (
          <button
            className="bc-mob-topbar__btn"
            aria-label="Keyboard shortcuts"
            title="Keyboard shortcuts"
            onClick={() => window.dispatchEvent(new CustomEvent("proto:open-shortcuts"))}
          >?</button>
        )}
        <button
          className="bc-mob-topbar__btn"
          aria-label="More"
          title="More"
          onClick={() => window.__proto.toast.push({ type: "info", message: "Page menu not in v1 prototype." })}
        >⋯</button>
      </header>
    );

    const BottomNav = ({ route }) => {
      const items = [
        { key: "library",   label: "Library",   icon: "▦", path: "/" },
        { key: "listening", label: "Listening", icon: "♪", path: "/listening" },
        { key: "settings",  label: "Settings",  icon: "⚙", path: "/settings/tts" },
      ];
      const active =
        route.path === "/listening" ? "listening"
        : route.path.startsWith("/settings") ? "settings"
        : "library";
      return (
        <nav className="bc-bottom-nav" role="tablist" aria-label="Primary">
          {items.map((it) => (
            <button
              key={it.key}
              role="tab"
              aria-selected={active === it.key}
              className={`bc-bottom-nav__item ${active === it.key ? "active" : ""}`}
              onClick={() => navigate(it.path)}
            >
              <span className="ico" aria-hidden="true">{it.icon}</span>
              <span>{it.label}</span>
            </button>
          ))}
        </nav>
      );
    };

    // ─────────────────────────────────────────────────────────────────
    // LISTENING — currently-loaded section quick view
    // ─────────────────────────────────────────────────────────────────
    const ListeningScreen = () => {
      const player = window.__proto.usePlayer();
      const sections = window.__proto.useStore("sections");
      const books = window.__proto.useStore("books");
      const section = player.section_id ? sections.find((s) => s.id === player.section_id) : null;
      const book = section ? books.find((b) => b.id === section.book_id) : (player.book_id ? books.find((b) => b.id === player.book_id) : null);

      if (!section || !book) {
        return (
          <div className="screen">
            <h1 style={{ marginBottom: 8 }}>Listening</h1>
            <EmptyState
              icon="♪"
              title="Nothing playing"
              description="Start a section or the book summary to see playback details here."
              cta={<Button variant="primary" size="md" onClick={() => navigate("/")}>Browse library</Button>}
            />
          </div>
        );
      }

      return (
        <div className="screen">
          <h1 style={{ marginBottom: 8 }}>Listening</h1>
          <Card>
            <div className="small muted" style={{ marginBottom: 4 }}>{book.title} · {book.author}</div>
            <h2 style={{ marginTop: 0, marginBottom: 6 }}>{section.title}</h2>
            <div className="meta-row">
              <EngineChip engine={player.engine || "kokoro"} voice={player.voice || ""} />
              <span className="pill">sentence {(player.sentence_index || 0) + 1} of {player.sentence_count || section.sentence_count}</span>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Button variant="primary" size="md" onClick={() => navigate(`/books/${book.id}/section/${section.id}`)}>
                Open section
              </Button>
              <Button variant="secondary" size="md" onClick={() => navigate(`/books/${book.id}/audio`)}>
                Book audio
              </Button>
            </div>
          </Card>
        </div>
      );
    };
    window.__screens["listening"] = ListeningScreen;

    const titleFor = (match) => {
      if (match.name === "library") return "Library";
      if (match.name === "settings-tts") return "Settings";
      if (match.name === "listening") return "Listening";
      if (match.name === "not-found") return "Not found";
      const book = window.__proto.store.get("books", match.params.id);
      return book ? book.title : "Book";
    };

    const App = () => {
      const route = window.__proto.useRoute();
      const match = matchRoute(route.path);
      const Screen = window.__screens[match.name] || window.__screens["not-found"];
      const title = titleFor(match);
      const showBack = match.name !== "library";

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <TopBar route={route} title={title} showBack={showBack} />
          <div className="app-content" style={{ flex: 1, overflowY: "auto" }}>
            <Screen params={match.params} route={route} />
          </div>
          <BottomNav route={route} />
          <KbdShortcutsModal />
          <GlobalToasts />
        </div>
      );
    };

    // Boot
    (async () => {
      await window.__proto.ready;
      const root = ReactDOM.createRoot(document.getElementById("app-root"));
      root.render(<App />);
    })();
})();
  </script>

</body>
</html>
